<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyOE - Hệ Thống Quản Lý Người Dùng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 650px;
            padding: 50px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to right, #a78bfa, var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn-enter {
            display: inline-block;
            padding: 16px 40px;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #6d28d9 100%);
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JAVA WEB REWRITTEN</h1>
        <p>Hệ Thống Quản Lý Người Dùng Tối Ưu Hóa Chạy Trên GitHub Pages</p>
        <a href="user.html" class="btn-enter">Vào Hệ Thống Thao Tác →</a>
    </div>
</body>
</html>
